<style>
  :root{ --bar:#1e2330; --accent:#76b7b2; --txt:#e8eaf0; --muted:#aab1c2; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f1320}
  .bar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;gap:18px;

  .bar a{color:var(--txt);text-decoration:none;font-size:13.5px;padding:6px 10px;border-radius:7px;border:1px solid transparent}
  .bar a:hover{background:rgba(255,255,255,.08)}
  .bar a.cur{border-color:var(--accent);color:var(--accent)}
  iframe{position:fixed;top:52px;left:0;width:100%;height:calc(100% - 52px);border:0;background:#fff}
  .fallback{position:fixed;bottom:10px;left:14px;color:var(--muted);font-size:12px;z-index:10;background:rgba(15,19,32,.7);padding:4px 9px;border-radius:6px}
