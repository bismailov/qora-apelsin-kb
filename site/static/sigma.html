(function(){
  const Graph = (window.graphology && (graphology.Graph||graphology.default||graphology));
  const SigmaCtor = (typeof Sigma==='function')?Sigma:(window.Sigma&&(Sigma.Sigma||Sigma.default));
  if(!Graph || !SigmaCtor){ document.getElementById('loading').textContent='Kutubxona yuklanmadi (libraries failed to load).'; return; }
  const graph = new Graph();
  DATA.nodes.forEach(n=> graph.addNode(n.id,{x:n.x,y:n.y,size:n.size,label:n.label,color:n.color,
      community:n.community,degree:n.degree}));
  let ei=0;
  DATA.edges.forEach(e=>{ if(graph.hasNode(e.source)&&graph.hasNode(e.target)&&!graph.hasEdge(e.source,e.target)){
      try{ graph.addEdgeWithKey('e'+(ei++), e.source, e.target, {color:'#e3e6ee', size:0.6}); }catch(_){} }});

  const container=document.getElementById('container');
  const renderer=new SigmaCtor(graph, container, {
    renderEdgeLabels:false, defaultEdgeColor:'#e6e9f0',
    labelColor:{color:'#192033'}, labelSize:13, labelWeight:'600',
    labelFont:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",
    labelRenderedSizeThreshold:11, zIndex:true,
    minCameraRatio:0.04, maxCameraRatio:6, enableEdgeEvents:false,
  });
  document.getElementById('loading').style.display='none';

  // hover highlight
  let hovered=null, neigh=null;
  function setHover(node){ hovered=node; neigh=new Set(graph.neighbors(node)); neigh.add(node); renderer.refresh(); }
  function clearHover(){ hovered=null; neigh=null; renderer.refresh(); }
  renderer.setSetting('nodeReducer',(node,data)=>{
    const r=Object.assign({},data);
    if(hovered){ if(neigh.has(node)){ r.zIndex=2; if(node===hovered) r.forceLabel=true; if(graph.degree(node)>=4||node===hovered) r.forceLabel=true; }
                 else { r.color='#e8eaf0'; r.label=''; r.zIndex=0; } }
    return r;
  });
  renderer.setSetting('edgeReducer',(edge,data)=>{
    const r=Object.assign({},data);
    if(hovered){ const ex=graph.extremities(edge); if(ex.includes(hovered)){ r.color='#8f99ab'; r.size=1.3; r.zIndex=2; } else { r.hidden=true; } }
    return r;
  });

  // tooltip with name + theme + links
  const tip=document.getElementById('tooltip');
  function showTip(node,evt){ const a=graph.getNodeAttributes(node);
    tip.innerHTML='<b>'+a.label+'</b><br>'+a.community+' · '+a.degree+' боғланиш';
    tip.style.display='block'; moveTip(evt); }
  function moveTip(evt){ const x=(evt&&evt.clientX)||0,y=(evt&&evt.clientY)||0;
    tip.style.left=Math.min(x+14,window.innerWidth-330)+'px'; tip.style.top=(y+14)+'px'; }
  renderer.on('enterNode',({node})=>{ setHover(node); container.style.cursor='pointer'; });
  renderer.on('leaveNode',()=>{ clearHover(); tip.style.display='none'; container.style.cursor='default'; });
  renderer.getMouseCaptor().on('mousemovebody',(e)=>{ if(hovered){ showTip(hovered,e.original); } });
  // click to zoom to node
  renderer.on('clickNode',({node})=>{ const p=renderer.getNodeDisplayData(node);
    renderer.getCamera().animate({x:p.x,y:p.y,ratio:0.18},{duration:550}); });
  renderer.on('clickStage',()=>{ renderer.getCamera().animatedReset({duration:500}); });

  // search
  const search=document.getElementById('search');
  search.addEventListener('keydown',(ev)=>{ if(ev.key!=='Enter') return;
    const q=search.value.trim().toLowerCase(); if(!q) return;
    let hit=null; graph.forEachNode((n,a)=>{ if(!hit && a.label.toLowerCase().includes(q)) hit=n; });
    if(hit){ const p=renderer.getNodeDisplayData(hit); renderer.getCamera().animate({x:p.x,y:p.y,ratio:0.12},{duration:600}); setHover(hit); }
  });

  // legend
  const li=document.getElementById('legend-items');
  DATA.communities.forEach(c=>{ const d=document.createElement('div'); d.className='lg';
    d.innerHTML='<span class="dot" style="background:'+c.color+'"></span><span class="nm" title="'+c.name.replace(/"/g,'')+'">'+c.name+'</span><span class="ct">'+c.count+'</span>';
    li.appendChild(d); });
})();
</script>
</body>
</html>
