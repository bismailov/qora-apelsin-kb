<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Қора апелсин — билимлар графи / knowledge graph</title>
<meta name="description" content="Qora apelsin — interactive knowledge graph of the book (524 concepts, 1005 links, 21 themes). Bilingual Uzbek/English."/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%23f28e2b'/></svg>"/>
<style>
  :root{ --bar:#1e2330; --accent:#f28e2b; --txt:#e8eaf0; --muted:#aab1c2; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f1320}
  .bar{position:fixed;top:0;left:0;right:0;height:50px;display:flex;align-items:center;gap:14px;
       padding:0 16px;background:var(--bar);color:var(--txt);z-index:10;box-shadow:0 1px 8px rgba(0,0,0,.35)}
  .bar .title{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .title small{font-weight:400;color:var(--muted)}
  .bar nav{display:flex;gap:8px;margin-left:auto}
  .bar a,.bar button{color:var(--txt);background:none;border:1px solid transparent;cursor:pointer;
       text-decoration:none;font-size:13px;padding:6px 10px;border-radius:7px;font-family:inherit}
  .bar a:hover,.bar button:hover{background:rgba(255,255,255,.08)}
  iframe{position:fixed;top:50px;left:0;width:100%;height:calc(100% - 50px);border:0}
</style>
</head>
<body>
  <div class="bar">
    <div class="title">Қора апелсин <small>— билимлар графи · 524 тушунча</small></div>
    <nav>
      <button onclick="(document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen())">⤢ Тўлиқ экран</button>
      <a href="https://github.com/bismailov/qora-apelsin-kb" target="_blank" rel="noopener">↗ GitHub</a>
    </nav>
  </div>
  <iframe src="graph-raw.html" title="Knowledge graph"></iframe>
</body>
</html>
